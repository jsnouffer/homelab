muxarr:
  enabled: true
  global:
    fullnameOverride: &name muxarr
  defaultPodOptions:
    automountServiceAccountToken: false
  controllers:
    main:
      containers:
        main:
          image:
            repository: ghcr.io/kirovair/muxarr
            tag: latest # managed by ArgoCD Image Updater
          env:
            TZ: "America/New_York"
            PUID: "1000"
            PGID: "1000"
          resources:
            requests:
              cpu: 200m
              memory: 200Mi
            limits:
              cpu: 1200m
              memory: 1200Mi
          probes:
            liveness: &lr-probe
              enabled: true
              type: &probe-type HTTP
              path: &probe-path /
              spec:
                initialDelaySeconds: 0
                periodSeconds: 10
                timeoutSeconds: 1
                failureThreshold: 3
            readiness: *lr-probe
            startup:
              enabled: true
              type: *probe-type
              path: *probe-path
              spec:
                initialDelaySeconds: 10
                periodSeconds: 5
                timeoutSeconds: 5
                successThreshold: 1
                failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            seccompProfile:
              type: RuntimeDefault
  service:
    main:
      controller: main
      ports:
        http:
          port: &main-port 8183
  ingress:
    main:
      enabled: true
      hosts:
        - host: &domain muxarr.jsnouff.net
          paths:
            - path: /
              pathType: Prefix
              service:
                name: *name
                port: *main-port
      tls:
        - hosts:
            - *domain
          secretName: tls-secret
      annotations:
        cert-manager.io/cluster-issuer: lets-encrypt-production
        ingress.kubernetes.io/force-ssl-redirect: "true"
        ingress.kubernetes.io/protocol: http
        kubernetes.io/ingress.class: traefik
        kubernetes.io/tls-acme: "true"
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.middlewares: traefik-default-security@kubernetescrd
        traefik.ingress.kubernetes.io/router.tls.options: traefik-default-tls@kubernetescrd
        traefik.ingress.kubernetes.io/router.tls: "true"

  persistence:
    data:
      enabled: true
      accessMode: ReadWriteOnce
      size: 1Gi
      advancedMounts:
        main:
          main:
            - path: /data
    media:
      enabled: true
      type: custom
      volumeSpec:
        nfs:
          server: barenas.jsnouff.net
          path: /mnt/plex/media
      advancedMounts:
        main:
          main:
            - path: /completed

common:
  resticBackups:
    enabled: true
    targets:
      muxarr-data:
        pvcName: muxarr
        bucket: muxarr-backup
        restoreVersion: latest
        tags:
          - "{{ $.Values.muxarr.controllers.main.containers.main.image.repository }}:{{ $.Values.muxarr.controllers.main.containers.main.image.tag }}"
        affinity:
          podAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                    - *name
                  - key: app.kubernetes.io/controller
                    operator: In
                    values:
                    - main
                topologyKey: kubernetes.io/hostname
